<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Producto</title>
</head>

<body>
    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org">

    <head>
        <title>Usuarios</title>

        <!-- Google Fonts -->
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

        <!-- Iconos -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href=/Producto.css>
    </head>

    <body>

        <ul>
            <li class="SignUp"><a th:href="@{/registro}">Sign Up</a></li>
            <li class="Home"><a th:href="@{/home}">Home</a></li>
            <li class="CRUD"><a href="">CRUD</a></li>
            <li class="AboutUs"><a href="">About Us</a></li>
            <li class="logout"><a th:href="@{/usuario}">Logout</a></li>
            <li class="user">
                <img th:if="${session.isAdmin == true}" src="/YO.jpeg" alt="Admin">

                <img th:unless="${session.isAdmin == true}" src="/user-icon.png" alt="User">
            </li>
        </ul>

        <div class="main">

            <h1><i class="fas fa-users"></i>Gestion de Productos</h1>

            <div class="search-box">
                <input type="text" id="buscar" placeholder="Buscar producto..." onkeyup="filtrarTabla()">
            </div>

            <table id="tablaUsuarios">
                <thead>
                    <tr>
                        <th>Codigo</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Accion</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="u : ${Productos}">
                        <td th:text="${u.codigoProducto}"></td>
                        <td th:text="${u.nombreProducto}"></td>
                        <td th:text="${u.precio}"></td>
                        <td th:text="${u.stock}"></td>
                        <td th:text="${u.estado}"></td>
                        <td>
                            <a th:href="@{'/producto/eliminar/' + ${u.codigoProducto}}">
                                <button class="btn-delete">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>

        </div>

        <script>
            function filtrarTabla() {
                let input = document.getElementById("buscar").value.toLowerCase();
                let filas = document.querySelectorAll("#tablaUsuarios tbody tr");

                filas.forEach(fila => {
                    let texto = fila.innerText.toLowerCase();
                    fila.style.display = texto.includes(input) ? "" : "none";
                });
            }
        </script>

    </body>

    </html>
</body>

</html>
