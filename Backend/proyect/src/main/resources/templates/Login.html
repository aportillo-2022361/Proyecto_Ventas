<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/Login.css}">
</head>
<body>
<form th:action="@{/login}" method="post" class="form">
    <p>Login</p>
    <div class="group">
        <input name="usuario" required="true" class="main-input" type="text">
        <span class="highlight-span"></span>
        <label class="lebal-email">Usuario</label>
    </div>
    <div class="container-1">
        <div class="group">
            <input name="password" required="true" class="main-input" type="password">
            <span class="highlight-span"></span>
            <label class="lebal-email">password</label>
        </div>
    </div>
    <button class="submit">submit</button>
</form>
</body>
</html>
